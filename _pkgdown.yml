url: https://asanaei.github.io/LLMRagent/

template:
  bootstrap: 5
  bslib:
    primary: "#2C3E50"

home:
  title: "LLMRagent: language-model agents for R"

reference:
- title: Agents, budgets, and memory
  desc: >
    Create agents with model configurations, personas, memory policies, and
    declared budgets.
  contents:
  - agent
  - budget
  - memory
- title: Governed tools and human review
  desc: >
    Declare tool effects and limits, check boundaries, and pause tool calls
    for a human decision.
  contents:
  - agent_tool
  - guardrail
  - guardrails
  - human_gate
  - approve_tool_call
  - resume_run
- title: Designed conversations and group decisions
  desc: >
    Run general conversations or formats designed for argument, group
    discussion, interviews, and collective decisions.
  contents:
  - conversation
  - debate
  - focus_group
  - interview
  - deliberate
- title: Experiments and robustness
  desc: >
    Run factorial designs and robustness batteries, and check cross-cell
    state leakage.
  contents:
  - agent_experiment
  - check_state_leakage
  - agent_robustness
  - robustness-axes
- title: Personas and claim scope
  desc: >
    Represent and vary personas, inspect essentializing language, and mark
    the scope of claims.
  contents:
  - persona_frame
  - persona_variants
  - persona_audit
  - mark_claim_type
  - llm_claim_lint
- title: Delegation and model coordination
  desc: >
    Coordinate specialist agents through model-directed delegation, fixed
    pipelines, or fan-out synthesis.
  contents:
  - agent_as_tool
  - agent_pipeline
  - agent_fanout_synthesis
- title: Run records, archives, and reports
  desc: >
    Create common run records, manifests, and inspectable archives. Includes
    report, diagnostics, and reset methods for LLMRagent results.
  contents:
  - as_agent_run
  - agent_manifest
  - archive_agent_study
  - hash_persona
  - hash_tool_spec
  - llmragent-methods
  - reexports
  - diagnostics.agent_run
  - diagnostics.agent_experiment
  - diagnostics.persona_audit
  - report.agent_run
  - report.agent_experiment
  - reset.Agent
- title: Resumable workflows and replay
  desc: >
    Branched and resumable procedures with checkpoints, forks, and workflow
    replay.
  contents:
  - agent_workflow
  - add_node
  - add_edge
  - run_workflow
  - resume_workflow
  - fork_workflow
  - replay_run
  - workflow_from_pipeline
- title: External tools and inspection
  desc: >
    Connect governed MCP tools and write an HTML view of a run record.
  contents:
  - mcp_tools
  - view_run
- title: Saving and loading agents
  desc: >
    Persist agent state and restore it with tool functions attached again.
  contents:
  - save_agent
  - load_agent
- title: Package
  contents:
  - LLMRagent-package

articles:
- title: Getting started
  navbar: Getting started
  contents:
  - getting-started
  - governed-tools-and-human-review
  - designed-conversations
  - deliberation-experiment
  - validity-robustness-and-claims
  - provenance-and-archiving
- title: Advanced coordination
  navbar: Advanced
  contents:
  - fanout-synthesis
  - workflows
